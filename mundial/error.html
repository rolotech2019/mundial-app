<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚽ Mundial 2026 - Sin conexión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2f3a 0%, #0a1f2a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .error-container {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,180,70,0.3);
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }
        /* Contenedor del icono offline (emoji + barra) */
        .offline-icon {
            position: relative;
            display: inline-block;
            font-size: 5rem;
            margin-bottom: 20px;
            /* La barra inclinada se dibuja con el pseudo‑elemento */
        }
        .offline-icon::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130%;
            height: 6px;
            background: #e94560;
            transform: translate(-50%, -50%) rotate(-45deg);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(233,69,96,0.8);
        }
        .error-title {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .error-subtitle {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn-reload {
            background: #ffb347;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            color: #1e2a32;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255,180,70,0.3);
            display: inline-block;
        }
        .btn-reload:hover {
            background: #ffa000;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,180,70,0.5);
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="offline-icon">
            ⚽
        </div>
        <div class="error-title">Sin conexión</div>
        <div class="error-subtitle">
            Parece que no tienes conexión a Internet.<br>
            Verifica tu red y vuelve a intentarlo.
        </div>
        <button class="btn-reload" onclick="location.reload();">
            🔄 Reintentar
        </button>
        <div class="footer-note">
            Mundial 2026 &copy; 2026
        </div>
    </div>
</body>
</html>
